services:
  caddy:
    image: caddy/caddy
    build: .
    ports:
      - 8080:80
      - 8443:443
    volumes:
      - "../pki/caddy.local.cetacean.club:/etc/techaro/pki/caddy.local.cetacean.club/"

  anubis:
    image: ghcr.io/georgealpha9/anubis:latest
    environment:
      BIND: ":3000"
      TARGET: http://httpdebug:3000
      DIFFICULTY: "10"

    volumes:
      - ../anubis_configs:/etc/techaro/anubis

  httpdebug:
    image: ghcr.io/xe/x/httpdebug
    pull_policy: always
